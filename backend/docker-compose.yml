version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — local development / production stack
# Usage:
#   docker compose up --build           # start everything
#   docker compose up --build backend   # start backend only
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Flask / yt-dlp backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: social-video-downloader-backend
    container_name: svd_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      PORT: 8000
      # Override ALLOWED_ORIGINS if your front-end is served elsewhere
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      # Point rate-limiter at Redis if you scale horizontally
      RATELIMIT_STORAGE_URL: "memory://"
    volumes:
      # Persist cached downloads across restarts
      - svd_downloads:/app/downloads
      - svd_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Optional: Redis for multi-worker rate limiting ──────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: svd_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  svd_downloads:
  svd_logs:
